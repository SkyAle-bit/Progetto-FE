<div class="login-page">
  <!-- ═══ LEFT: Form ═══ -->
  <div class="login-left">
    <!-- Back Button -->
    <button routerLink="/login" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Torna al Login
    </button>

    <div class="login-center">
      <!-- Brand logo -->
      <div class="brand">
        <img src="assets/images/kore_login.png" alt="Kore Logo" class="brand-logo-img">
      </div>

      <!-- ═══ MODE: REQUEST (inserisci email) ═══ -->
      <ng-container *ngIf="mode === 'request'">
        <div class="login-heading">
          <h2 class="card-title">Password dimenticata?</h2>
          <p class="card-subtitle">Inserisci la tua email e ti invieremo un link per reimpostare la password</p>
        </div>

        <div class="login-form">
          <!-- Success -->
          <div *ngIf="successMessage" class="success-banner" role="status">
            <span class="success-icon" aria-hidden="true">✓</span>
            {{ successMessage }}
          </div>

          <!-- Error -->
          <div *ngIf="errorMessage" class="error-banner" role="alert">
            <span class="error-icon" aria-hidden="true">!</span>
            {{ errorMessage }}
          </div>

          <!-- Email -->
          <div class="field-group" *ngIf="!successMessage">
            <label class="field-label" for="email">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input id="email" type="email" [(ngModel)]="email" placeholder="mario.rossi&#64;example.com"
                autocomplete="email" (keydown.enter)="requestReset()">
            </div>
          </div>

          <!-- Submit -->
          <button *ngIf="!successMessage" class="btn-primary" (click)="requestReset()" [disabled]="loading">
            <span *ngIf="!loading">Invia Link di Reset</span>
            <span *ngIf="loading">Invio in corso...</span>
          </button>
        </div>
      </ng-container>

      <!-- ═══ MODE: RESET (inserisci nuova password con token) ═══ -->
      <ng-container *ngIf="mode === 'reset'">
        <div class="login-heading">
          <h2 class="card-title">Nuova Password</h2>
          <p class="card-subtitle">Inserisci la tua nuova password</p>
        </div>

        <div class="login-form">
          <!-- Success -->
          <div *ngIf="successMessage" class="success-banner" role="status">
            <span class="success-icon" aria-hidden="true">✓</span>
            {{ successMessage }}
          </div>

          <!-- Error -->
          <div *ngIf="errorMessage" class="error-banner" role="alert">
            <span class="error-icon" aria-hidden="true">!</span>
            {{ errorMessage }}
          </div>

          <ng-container *ngIf="!successMessage">
            <!-- New password -->
            <div class="field-group">
              <label class="field-label" for="newPassword">Nuova Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input id="newPassword" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword"
                  placeholder="Minimo 6 caratteri" autocomplete="new-password">
                <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()">
                  <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                  <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Confirm password -->
            <div class="field-group">
              <label class="field-label" for="confirmPassword">Conferma Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input id="confirmPassword" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"
                  placeholder="Ripeti la password" autocomplete="new-password" (keydown.enter)="resetPassword()">
              </div>
            </div>

            <!-- Submit -->
            <button class="btn-primary" (click)="resetPassword()" [disabled]="loading">
              <span *ngIf="!loading">Reimposta Password</span>
              <span *ngIf="loading">Reimpostazione in corso...</span>
            </button>
          </ng-container>
        </div>
      </ng-container>

      <div class="card-footer">
        <a routerLink="/login" class="link">← Torna al Login</a>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT: Video ═══ -->
  <div class="login-right">
    <video autoplay muted loop playsinline class="login-video">
      <source src="https://res.cloudinary.com/dpgixeqq0/video/upload/v1774348514/login_video_tvmf8w.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>
</div>
